<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Octagon background -->
  <polygon points="38,4 90,4 124,38 124,90 90,124 38,124 4,90 4,38" fill="#0f0f1a" stroke="#d4a843" stroke-width="3"/>
  <!-- Inner octagon accent -->
  <polygon points="42,12 86,12 116,42 116,86 86,116 42,116 12,86 12,42" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
  <!-- CD monogram -->
  <text x="64" y="82" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="52" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#ffffff">C</tspan><tspan fill="#c0392b">D</tspan>
  </text>
  <!-- Gold bottom accent line -->
  <line x1="38" y1="96" x2="90" y2="96" stroke="#d4a843" stroke-width="2.5" stroke-linecap="round"/>
</svg>
